<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Family Sick Tracker</title>

<style>
  * {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    background: #f5f7fa;
    color: #222;
    padding: 25px;
  }

  h1 {
    text-align: center;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
  }

  .section-title {
    margin-top: 0;
    margin-bottom: 18px;
  }

  .flex {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  input, select, button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  button {
    background: #111827;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.92;
  }

  .members {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .member-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f1f1f1;
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: bold;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }

  .months {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
    gap: 20px;
  }

  .month {
    background: white;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
  }

  .month h3 {
    margin-top: 0;
  }

  .entry {
    color: white;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: bold;
  }

  .analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 15px;
  }

  .analytic-box {
    background: white;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
  }

  .analytic-label {
    color: #666;
    margin-bottom: 8px;
  }

  .analytic-value {
    font-size: 28px;
    font-weight: bold;
  }

</style>
</head>

<body>

<h1>🤒 Family Sick Tracker</h1>
<div class="subtitle">
Track illness trends throughout the year.
</div>

<div class="card">
  <h2 class="section-title">Create Family Member</h2>

  <div class="flex">
    <input type="text" id="memberName" placeholder="Family member name"/>

    <input type="color" id="memberColor" value="#ff0000"/>

    <button onclick="addMember()">Add Member</button>
  </div>

  <br>

  <div class="members" id="members"></div>
</div>

<div class="card">
  <h2 class="section-title">Add Sick Period</h2>

  <div class="flex">

    <select id="personSelect"></select>

    <input type="date" id="startDate"/>

    <input type="date" id="endDate"/>

    <input type="text" id="illness" placeholder="Cold, Flu, Gastro..."/>

    <button onclick="addSickPeriod()">Add Sick Range</button>

  </div>
</div>

<h2>📊 Analytics</h2>

<div class="analytics-grid">

  <div class="analytic-box">
    <div class="analytic-label">Most Sick</div>
    <div class="analytic-value" id="mostSick">-</div>
  </div>

  <div class="analytic-box">
    <div class="analytic-label">Least Sick</div>
    <div class="analytic-value" id="leastSick">-</div>
  </div>

  <div class="analytic-box">
    <div class="analytic-label">Total Sick Days</div>
    <div class="analytic-value" id="totalDays">0</div>
  </div>

</div>

<br><br>

<h2>🗓️ Year Overview</h2>

<div class="months" id="months"></div>

<script>

let familyMembers = JSON.parse(localStorage.getItem("familyMembers")) || [];

let sickEntries = JSON.parse(localStorage.getItem("sickEntries")) || [];

const monthNames = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

function saveData() {
  localStorage.setItem("familyMembers", JSON.stringify(familyMembers));
  localStorage.setItem("sickEntries", JSON.stringify(sickEntries));
}

function addMember() {

  const name = document.getElementById("memberName").value.trim();
  const color = document.getElementById("memberColor").value;

  if (!name) {
    alert("Please enter a name.");
    return;
  }

  familyMembers.push({
    name,
    color
  });

  saveData();

  document.getElementById("memberName").value = "";

  renderMembers();
  renderSelect();
  renderAnalytics();
}

function renderMembers() {

  const container = document.getElementById("members");

  container.innerHTML = "";

  familyMembers.forEach(member => {

    const div = document.createElement("div");

    div.className = "member-pill";

    div.innerHTML = `
      <div class="dot" style="background:${member.color}"></div>
      ${member.name}
    `;

    container.appendChild(div);

  });

}

function renderSelect() {

  const select = document.getElementById("personSelect");

  select.innerHTML = "";

  familyMembers.forEach(member => {

    const option = document.createElement("option");

    option.value = member.name;
    option.textContent = member.name;

    select.appendChild(option);

  });

}

function addSickPeriod() {

  const person = document.getElementById("personSelect").value;
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;
  const illness = document.getElementById("illness").value;

  if (!person || !startDate || !endDate) {
    alert("Please complete all fields.");
    return;
  }

  sickEntries.push({
    person,
    startDate,
    endDate,
    illness
  });

  saveData();

  renderMonths();
  renderAnalytics();

}

function renderMonths() {

  const container = document.getElementById("months");

  container.innerHTML = "";

  for (let month = 0; month < 12; month++) {

    const monthDiv = document.createElement("div");

    monthDiv.className = "month";

    let html = `<h3>${monthNames[month]}</h3>`;

    const filtered = sickEntries.filter(entry => {

      const entryMonth = new Date(entry.startDate).getMonth();

      return entryMonth === month;

    });

    if (filtered.length === 0) {
      html += `<p style="color:#777;">No sickness recorded.</p>`;
    }

    filtered.forEach(entry => {

      const member = familyMembers.find(m => m.name === entry.person);

      const start = new Date(entry.startDate);
      const end = new Date(entry.endDate);

      const days =
        Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;

      html += `
        <div class="entry" style="background:${member?.color || "#333"}">
          ${entry.person}<br>
          ${entry.startDate} → ${entry.endDate}<br>
          ${days} day(s)<br>
          ${entry.illness || ""}
        </div>
      `;

    });

    monthDiv.innerHTML = html;

    container.appendChild(monthDiv);

  }

}

function renderAnalytics() {

  let totals = {};

  familyMembers.forEach(member => {
    totals[member.name] = 0;
  });

  sickEntries.forEach(entry => {

    const start = new Date(entry.startDate);
    const end = new Date(entry.endDate);

    const days =
      Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;

    totals[entry.person] += days;

  });

  const sorted = Object.entries(totals)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length > 0) {

    document.getElementById("mostSick").innerHTML =
      `${sorted[0][0]} (${sorted[0][1]} days)`;

    document.getElementById("leastSick").innerHTML =
      `${sorted[sorted.length - 1][0]} (${sorted[sorted.length - 1][1]} days)`;

  }

  const total = Object.values(totals)
    .reduce((a,b) => a+b,0);

  document.getElementById("totalDays").innerHTML = total;

}

renderMembers();
renderSelect();
renderMonths();
renderAnalytics();

</script>

</body>
</html>
