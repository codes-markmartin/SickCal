<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Family Sick Tracker</title>

  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">

const SUPABASE_URL = "YOUR_PROJECT_URL";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);
  
</script>

<style>

*{
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  margin:0;
  background:#f4f7fb;
  color:#222;
  padding:25px;
}

h1{
  text-align:center;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:30px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 16px rgba(0,0,0,0.08);
}

.section-title{
  margin-top:0;
  margin-bottom:18px;
}

.flex{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

input, select, button{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  border:none;
  background:#111827;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.92;
}

.members{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.member-pill{
  display:flex;
  align-items:center;
  gap:8px;
  background:#f1f1f1;
  padding:10px 14px;
  border-radius:999px;
  font-weight:bold;
}

.dot{
  width:16px;
  height:16px;
  border-radius:50%;
}

.analytics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.analytics-box{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 5px 16px rgba(0,0,0,0.08);
}

.analytic-label{
  color:#666;
  margin-bottom:8px;
}

.analytic-value{
  font-size:28px;
  font-weight:bold;
}

.months{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.month{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 5px 16px rgba(0,0,0,0.08);
}

.month h3{
  margin-top:0;
}

.entry{
  color:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:bold;
  line-height:1.5;
}

.small{
  font-size:13px;
  opacity:0.95;
}

.status{
  text-align:center;
  margin-bottom:18px;
  color:#666;
}

</style>
</head>

<body>

<h1>🤒 Family Sick Tracker</h1>

<div class="subtitle">
Track sickness patterns across the family throughout the year.
</div>

<div class="status" id="status">
Connecting to Supabase...
</div>

<div class="card">

  <h2 class="section-title">Create Family Member</h2>

  <div class="flex">

    <input
      type="text"
      id="memberName"
      placeholder="Family member name"
    />

    <input
      type="color"
      id="memberColor"
      value="#ff0000"
    />

    <button onclick="addMember()">
      Add Member
    </button>

  </div>

  <br>

  <div class="members" id="members"></div>

</div>

<div class="card">

  <h2 class="section-title">Add Sick Period</h2>

  <div class="flex">

    <select id="personSelect"></select>

    <input type="date" id="startDate"/>

    <input type="date" id="endDate"/>

    <input
      type="text"
      id="illness"
      placeholder="Cold, Flu, Gastro..."
    />

    <button onclick="addSickPeriod()">
      Add Sick Range
    </button>

  </div>

</div>

<h2>📊 Analytics</h2>

<div class="analytics-grid">

  <div class="analytics-box">
    <div class="analytic-label">Most Sick</div>
    <div class="analytic-value" id="mostSick">-</div>
  </div>

  <div class="analytics-box">
    <div class="analytic-label">Least Sick</div>
    <div class="analytic-value" id="leastSick">-</div>
  </div>

  <div class="analytics-box">
    <div class="analytic-label">Total Sick Days</div>
    <div class="analytic-value" id="totalDays">0</div>
  </div>

</div>

<br><br>

<h2>🗓️ Year Overview</h2>

<div class="months" id="months"></div>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL =
  "https://dakljrkkjakylnryofia.supabase.co";

const SUPABASE_ANON_KEY =
  "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

/*
Get this from:
Supabase Dashboard
→ Settings
→ API
→ anon public key
*/

const supabase =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

/* =========================
   GLOBAL STATE
========================= */

let familyMembers = [];
let sickEntries = [];

const monthNames = [
  "January","February","March","April",
  "May","June","July","August",
  "September","October","November","December"
];

/* =========================
   INIT
========================= */

init();

async function init(){

  await loadMembers();

  await loadEntries();

  renderMembers();

  renderSelect();

  renderMonths();

  renderAnalytics();

  document.getElementById("status").innerHTML =
    "✅ Connected to shared family database";

}

/* =========================
   LOAD DATA
========================= */

async function loadMembers(){

  const { data, error } =
    await supabase
      .from("family_members")
      .select("*")
      .order("name");

  if(error){
    console.error(error);
    return;
  }

  familyMembers = data || [];

}

async function loadEntries(){

  const { data, error } =
    await supabase
      .from("sick_entries")
      .select("*")
      .order("start_date", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  sickEntries = data || [];

}

/* =========================
   ADD MEMBER
========================= */

async function addMember(){

  const name =
    document.getElementById("memberName")
      .value
      .trim();

  const color =
    document.getElementById("memberColor")
      .value;

  if(!name){
    alert("Please enter a name.");
    return;
  }

  const { error } =
    await supabase
      .from("family_members")
      .insert([
        {
          name,
          color
        }
      ]);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("memberName").value = "";

  await loadMembers();

  renderMembers();

  renderSelect();

  renderAnalytics();

}

/* =========================
   ADD SICK PERIOD
========================= */

async function addSickPeriod(){

  const person =
    document.getElementById("personSelect").value;

  const startDate =
    document.getElementById("startDate").value;

  const endDate =
    document.getElementById("endDate").value;

  const illness =
    document.getElementById("illness").value;

  if(!person || !startDate || !endDate){
    alert("Please complete all fields.");
    return;
  }

  const { error } =
    await supabase
      .from("sick_entries")
      .insert([
        {
          person,
          illness,
          start_date:startDate,
          end_date:endDate
        }
      ]);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("illness").value = "";

  await loadEntries();

  renderMonths();

  renderAnalytics();

}

/* =========================
   RENDER MEMBERS
========================= */

function renderMembers(){

  const container =
    document.getElementById("members");

  container.innerHTML = "";

  familyMembers.forEach(member => {

    const div = document.createElement("div");

    div.className = "member-pill";

    div.innerHTML = `
      <div
        class="dot"
        style="background:${member.color}"
      ></div>

      ${member.name}
    `;

    container.appendChild(div);

  });

}

/* =========================
   RENDER SELECT
========================= */

function renderSelect(){

  const select =
    document.getElementById("personSelect");

  select.innerHTML = "";

  familyMembers.forEach(member => {

    const option =
      document.createElement("option");

    option.value = member.name;

    option.textContent = member.name;

    select.appendChild(option);

  });

}

/* =========================
   RENDER MONTHS
========================= */

function renderMonths(){

  const container =
    document.getElementById("months");

  container.innerHTML = "";

  for(let month=0; month<12; month++){

    const monthDiv =
      document.createElement("div");

    monthDiv.className = "month";

    let html = `<h3>${monthNames[month]}</h3>`;

    const filtered =
      sickEntries.filter(entry => {

        const entryMonth =
          new Date(entry.start_date)
            .getMonth();

        return entryMonth === month;

      });

    if(filtered.length === 0){

      html += `
        <p style="color:#777;">
          No sickness recorded.
        </p>
      `;

    }

    filtered.forEach(entry => {

      const member =
        familyMembers.find(
          m => m.name === entry.person
        );

      const start =
        new Date(entry.start_date);

      const end =
        new Date(entry.end_date);

      const days =
        Math.floor(
          (end - start)
          / (1000*60*60*24)
        ) + 1;

      html += `
        <div
          class="entry"
          style="background:${member?.color || "#333"}"
        >

          ${entry.person}

          <div class="small">
            ${entry.start_date}
            →
            ${entry.end_date}
          </div>

          <div class="small">
            ${days} sick day(s)
          </div>

          ${
            entry.illness
            ? `<div class="small">${entry.illness}</div>`
            : ""
          }

        </div>
      `;

    });

    monthDiv.innerHTML = html;

    container.appendChild(monthDiv);

  }

}

/* =========================
   ANALYTICS
========================= */

function renderAnalytics(){

  let totals = {};

  familyMembers.forEach(member => {
    totals[member.name] = 0;
  });

  sickEntries.forEach(entry => {

    const start =
      new Date(entry.start_date);

    const end =
      new Date(entry.end_date);

    const days =
      Math.floor(
        (end - start)
        / (1000*60*60*24)
      ) + 1;

    totals[entry.person] += days;

  });

  const sorted =
    Object.entries(totals)
      .sort((a,b)=>b[1]-a[1]);

  if(sorted.length > 0){

    document.getElementById("mostSick")
      .innerHTML =
      `${sorted[0][0]} (${sorted[0][1]} days)`;

    document.getElementById("leastSick")
      .innerHTML =
      `${sorted[sorted.length-1][0]}
       (${sorted[sorted.length-1][1]} days)`;

  }

  const total =
    Object.values(totals)
      .reduce((a,b)=>a+b,0);

  document.getElementById("totalDays")
    .innerHTML = total;

}

</script>

</body>
</html>
